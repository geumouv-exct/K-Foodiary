<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-Foodendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="phone" aria-label="K-Foodendar app">
    <section id="calendarPage" class="page active"></section>
    <section id="addPage" class="page"></section>
    <section id="bookPage" class="page"></section>
    <section id="stampsPage" class="page"></section>
    <nav class="tabbar" aria-label="Main navigation">
      <button class="tab active" data-page="calendarPage"><span>📅</span><small>Calendar</small></button>
      <button class="tab add" data-page="addPage"><span>＋</span><small>Add</small></button>
      <button class="tab" data-page="bookPage"><span>📖</span><small>Book</small></button>
      <button class="tab" data-page="stampsPage"><span>🏅</span><small>Stamps</small></button>
    </nav>
  </main>
  <canvas id="stickerCanvas" hidden></canvas>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
